<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Baratão das Gôndolas - Atendimento</title>
    <style>
      :root {
        --primary-blue: #243a6d;
        --accent-yellow: #fad407;
        --bg-light: #f4f7f9;
        --text-dark: #2c3e50;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(135deg, #e0e5ec 0%, #f4f6f9 100%);
        height: 100vh;
        height: 100dvh; /* Ajuste dinâmico para telas de celular */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Impede a rolagem do fundo */
      }

      .chat-wrapper {
        width: 100%;
        max-width: 480px;
        height: 92vh;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        border-radius: 24px;
        box-shadow:
          0 20px 40px rgba(36, 58, 109, 0.12),
          0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .chat-header {
        background: #ffffff;
        color: var(--primary-blue);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        font-weight: 700;
        font-size: 1.2rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        position: relative;
        z-index: 10;
        border-bottom: 4px solid var(--accent-yellow);
      }

      .header-logo {
        height: 45px;
        object-fit: contain;
      }

      .header-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .header-status {
        font-size: 0.75rem;
        color: #4caf50;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
      }
      .header-status::before {
        content: "";
        width: 6px;
        height: 6px;
        background: #4caf50;
        border-radius: 50%;
        display: inline-block;
      }

      .chat-body {
        flex: 1;
        padding: 24px 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }

      .msg-wrapper {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .msg-wrapper.user {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .avatar.bot {
        background: var(--primary-blue);
        color: var(--accent-yellow);
      }

      .avatar.user {
        background: #e1e5eb;
        color: #666;
      }

      .avatar svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .msg-bubble {
        max-width: 85%;
        padding: 14px 18px;
        font-size: 0.95rem;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        word-wrap: break-word;
      }

      .msg-wrapper.bot .msg-bubble {
        background: #ffffff;
        color: var(--text-dark);
        border-radius: 20px 20px 20px 4px;
        border-left: 4px solid var(--accent-yellow);
      }

      .msg-wrapper.user .msg-bubble {
        background: var(--primary-blue);
        color: white;
        border-radius: 20px 20px 4px 20px;
      }

      .chat-footer {
        padding: 12px 16px;
        background: #ffffff;
        border-top: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        gap: 8px;
        align-items: center;
        padding-bottom: env(
          safe-area-inset-bottom,
          12px
        ); /* Proteção para o iPhone */
      }

      input[type="text"] {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid #e1e5eb;
        border-radius: 24px;
        font-size: 16px; /* 16px OBRIGATÓRIO para o iPhone não dar zoom ao clicar */
        outline: none;
        transition: all 0.3s ease;
        background: var(--bg-light);
      }

      input[type="text"]:focus {
        border-color: var(--primary-blue);
        background: white;
      }

      .action-btn {
        border: none;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s ease;
        flex-shrink: 0;
      }

      .mic-btn {
        background: transparent;
        color: var(--primary-blue);
        border: 2px solid #e1e5eb;
      }

      .mic-btn:active {
        transform: scale(0.95);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(255, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 68, 68, 0);
        }
      }

      .pulsing {
        animation: pulse 1.5s infinite;
        background-color: #ffebee !important;
        border-color: #ff4444 !important;
        color: #ff4444 !important;
      }

      .send-btn {
        background: var(--accent-yellow);
        color: var(--primary-blue);
        box-shadow: 0 4px 15px rgba(250, 212, 7, 0.3);
      }

      .send-btn:active {
        transform: scale(0.95);
      }

      .action-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .send-btn svg {
        transform: translateX(2px);
      }

      .typing-wrapper {
        display: none;
        gap: 10px;
        align-items: flex-end;
        margin-bottom: 8px;
      }

      .typing-indicator {
        background: white;
        padding: 14px 20px;
        border-radius: 20px 20px 20px 4px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        border-left: 4px solid var(--primary-blue);
      }

      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #a0a5ab;
        border-radius: 50%;
        margin: 0 2px;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd0d6;
        border-radius: 10px;
      }

      /* 📱 MODO MOBILE NATIVO (A mágica acontece aqui) */
      @media (max-width: 600px) {
        body {
          background: #ffffff; /* Fundo sólido para evitar recortes */
        }
        .chat-wrapper {
          height: 100dvh; /* Ocupa 100% da tela do celular sem ser cortado pela barra do Google */
          max-width: 100%;
          border-radius: 0; /* Tira as bordas arredondadas (estilo App) */
          box-shadow: none;
        }
        .msg-bubble {
          font-size: 1rem;
          padding: 12px 16px;
        }
        .chat-header {
          padding: 10px 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <img
          src="https://portfolio.chagassilva.com/wp-content/uploads/2026/02/logo_baratao_natal_3d_transparente.png"
          alt="Baratão Logo"
          class="header-logo"
        />
        <div class="header-text">
          <span>Baratão das Gôndolas</span>
          <span class="header-status">Online</span>
        </div>
      </div>

      <div id="chat-body" class="chat-body">
        <div class="msg-wrapper bot">
          <div class="avatar bot">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a3 3 0 0 1 3 3v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3v-1H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1V10a3 3 0 0 1 3-3h1V5.73A2 2 0 1 1 12 2zm-1 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm2 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-1-8a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"
              />
            </svg>
          </div>
          <div class="msg-bubble">
            Olá! Sou a assistente virtual do Baratão das Gôndolas. O que você
            procura hoje?
          </div>
        </div>
      </div>

      <div id="typing-wrapper" class="typing-wrapper">
        <div class="avatar bot">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a3 3 0 0 1 3 3v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3v-1H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1V10a3 3 0 0 1 3-3h1V5.73A2 2 0 1 1 12 2zm-1 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm2 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-1-8a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"
            />
          </svg>
        </div>
        <div class="typing-indicator">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="chat-footer">
        <button
          class="action-btn mic-btn"
          id="mic-btn"
          onclick="toggleRecording()"
          title="Gravar Áudio"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15a.999.999 0 00-.98-.85c-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"
            ></path>
          </svg>
        </button>

        <input
          type="text"
          id="user-input"
          placeholder="Digite sua mensagem..."
          onkeypress="handleEnter(event)"
          autocomplete="off"
        />

        <button
          class="action-btn send-btn"
          id="send-btn"
          onclick="sendMessage()"
        >
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const chatBody = document.getElementById("chat-body");
      const userInput = document.getElementById("user-input");
      const typingWrapper = document.getElementById("typing-wrapper");

      const WEBHOOK_URL = "https://n8n.chagassilva.com/webhook/chat-tld";

      const botSvg = `<svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a3 3 0 0 1 3 3v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3v-1H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1V10a3 3 0 0 1 3-3h1V5.73A2 2 0 1 1 12 2zm-1 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm2 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-1-8a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>`;
      const userSvg = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

      const mensagemResgate =
        "Ops! Tive um pequeno soluço na minha conexão agora. 😅<br><br>Nossa equipe de vendas está pronta para continuar seu atendimento agora mesmo:<br><br><a href='https://wa.me/5584999908555?text=Olá,%20estava%20falando%20com%20a%20Fernanda%20no%20site,%20mas%20o%20sistema%20caiu.%20Podem%20me%20ajudar?' target='_blank' style='color: var(--primary-blue); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--accent-yellow); padding-bottom: 1px;'>📲 Falar com Atendente no WhatsApp</a>";

      let mediaRecorder;
      let audioChunks = [];
      let isRecording = false;

      function playBeepSound() {
        try {
          const audioCtx = new (
            window.AudioContext || window.webkitAudioContext
          )();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(
            300,
            audioCtx.currentTime + 0.1,
          );
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + 0.1,
          );
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.1);
        } catch (e) {}
      }

      function formatText(text) {
        if (!text) return "";
        let formatted = text;
        formatted = formatted
          .replace(/`{3}[a-z]*\n?/gi, "")
          .replace(/`{3}/g, "");
        formatted = formatted.replace(
          /!\[([^\]]*)\]\s*\(\s*(.*?)\s*\)/g,
          function (m, alt, url) {
            return `<img src="${url.trim()}" alt="${alt}" style="max-width: 100%; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 12px rgba(36, 58, 109, 0.15); display: block;">`;
          },
        );
        formatted = formatted.replace(
          /\[([^\]]+)\]\s*\(\s*(.*?)\s*\)/g,
          function (m, texto, url) {
            return `<a href="${url.trim()}" target="_blank" style="color: var(--primary-blue); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--accent-yellow); padding-bottom: 1px;">${texto}</a>`;
          },
        );
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        formatted = formatted.replace(/\n/g, "<br>");
        return formatted;
      }

      function appendMessage(text, sender) {
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${sender}`;

        const avatar = document.createElement("div");
        avatar.className = `avatar ${sender}`;
        avatar.innerHTML = sender === "bot" ? botSvg : userSvg;

        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.innerHTML = formatText(text);

        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);

        chatBody.appendChild(wrapper);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      function handleEnter(e) {
        if (e.key === "Enter") sendMessage();
      }

      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        playBeepSound();
        appendMessage(text, "user");
        userInput.value = "";

        typingWrapper.style.display = "flex";
        chatBody.appendChild(typingWrapper);
        chatBody.scrollTop = chatBody.scrollHeight;

        try {
          const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensagem: text }),
          });

          const data = await response.json();
          typingWrapper.style.display = "none";

          if (
            !data ||
            !data.resposta ||
            data.resposta.includes("Erro") ||
            data.resposta.includes("Error")
          ) {
            appendMessage(mensagemResgate, "bot");
          } else {
            appendMessage(data.resposta, "bot");
          }
        } catch (error) {
          console.error("Erro na requisição:", error);
          typingWrapper.style.display = "none";
          appendMessage(mensagemResgate, "bot");
        }
      }

      // --- NOVA LÓGICA DE ÁUDIO UNIVERSAL ---
      async function toggleRecording() {
        const micButton = document.getElementById("mic-btn");

        if (isRecording) {
          mediaRecorder.stop();
          isRecording = false;
          micButton.classList.remove("pulsing");
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            // Removi a trava do "audio/webm" para respeitar o formato do celular do cliente
            const audioBlob = new Blob(audioChunks);
            const reader = new FileReader();

            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
              const base64Audio = reader.result;
              if (!base64Audio) {
                console.error("Erro ao converter áudio para Base64");
                return;
              }
              appendMessage("🎙️ Áudio enviado...", "user");
              enviarAudioParaServidor(base64Audio);
            };
          };

          mediaRecorder.start();
          isRecording = true;
          micButton.classList.add("pulsing");
        } catch (err) {
          alert(
            "Para enviar áudio, você precisa permitir o acesso ao microfone! 🎤\nLembre-se: O microfone só funciona em sites com HTTPS.",
          );
          console.error("Erro ao acessar microfone:", err);
        }
      }

      async function enviarAudioParaServidor(base64Audio) {
        typingWrapper.style.display = "flex";
        chatBody.appendChild(typingWrapper);
        chatBody.scrollTop = chatBody.scrollHeight;

        try {
          const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensagem: "", audioBase64: base64Audio }),
          });

          const data = await response.json();
          typingWrapper.style.display = "none";

          if (!data || !data.resposta || data.resposta.includes("Erro")) {
            appendMessage(mensagemResgate, "bot");
          } else {
            appendMessage(data.resposta, "bot");
          }
        } catch (error) {
          console.error("Erro na requisição de áudio:", error);
          typingWrapper.style.display = "none";
          appendMessage(mensagemResgate, "bot");
        }
      }
    </script>
  </body>
</html>
